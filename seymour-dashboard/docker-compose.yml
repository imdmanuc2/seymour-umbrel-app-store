services:
  app_proxy:
    environment:
      APP_HOST: seymour-dashboard_web_1
      APP_PORT: 3000

  web:
    image: node:22-alpine
    restart: on-failure
    working_dir: /app/backend
    command: node server.js
    environment:
      MININGCORE_API: "http://192.168.1.156:4000"
    volumes:
      - ${APP_DATA_DIR}/data/app:/app
