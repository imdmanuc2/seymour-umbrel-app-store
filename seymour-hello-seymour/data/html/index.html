<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hello Seymour</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #0f2f57, #020617 55%);
      color: #e5f3ff;
      font-family: Arial, sans-serif;
    }
    .card {
      max-width: 780px;
      padding: 42px;
      border-radius: 28px;
      background: rgba(8,18,37,.92);
      border: 1px solid #31527f;
      box-shadow: 0 0 80px rgba(0,0,0,.7);
      text-align: center;
    }
    h1 { font-size: 52px; margin: 0 0 12px; }
    .green { color: #39ff88; font-weight: 900; }
    p { font-size: 20px; color: #bfdbfe; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⛏️ Hello Seymour</h1>
    <p class="green">Your first Seymour Umbrel app is running.</p>
    <p>This proves the Seymour Mining Suite app packaging path is alive.</p>
  </div>
</body>
</html>
