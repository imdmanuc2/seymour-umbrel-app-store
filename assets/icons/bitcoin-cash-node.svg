<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Bitcoin Cash Node</title>
  <desc id="desc">Green Bitcoin Cash node hex icon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#05150C"/><stop offset="1" stop-color="#020617"/></linearGradient>
    <linearGradient id="cash" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#BBF7D0"/><stop offset=".45" stop-color="#22C55E"/><stop offset="1" stop-color="#16A34A"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="9" result="b"/><feColorMatrix in="b" type="matrix" values="0 0 0 0 .13 0 0 0 0 .77 0 0 0 0 .37 0 0 0 .8 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <path d="M256 42 439 148v216L256 470 73 364V148Z" fill="#0F172A" stroke="url(#cash)" stroke-width="16" filter="url(#glow)"/>
  <g transform="rotate(-12 256 256)">
    <text x="256" y="335" text-anchor="middle" font-size="220" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="url(#cash)" filter="url(#glow)">₿</text>
  </g>
</svg>
