services:
  app_proxy:
    environment:
      APP_HOST: seymour-miningcore_wizard_1
      APP_PORT: 8080

  wizard:
    build: ./data/wizard
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/configs:/configs
    environment:
      MININGCORE_REPO: https://github.com/imdmanuc2/seymour-miningcore

  postgres:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_DB: miningcore
      POSTGRES_USER: miningcore
      POSTGRES_PASSWORD: miningcore
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: on-failure
